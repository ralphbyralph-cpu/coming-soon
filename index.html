<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon — Something Big is Launching</title>
<meta name="description" content="We're building something amazing. Be the first to know when we launch — sign up for early access.">
<meta property="og:title" content="Coming Soon — Something Big is Launching">
<meta property="og:description" content="We're building something amazing. Be the first to know when we launch.">

<link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&f[]=general-sans@400,500,600&display=swap" rel="stylesheet">

<body>

  <div class="bg-shapes" aria-hidden="true">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
    <div class="shape shape-4"></div>
  </div>

  <main class="container">
    <!-- Rocket SVG -->
    <div class="rocket-wrapper" aria-hidden="true">
      <svg class="rocket" viewBox="0 0 120 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Exhaust flames -->
        <ellipse cx="60" cy="190" rx="18" ry="8" fill="#FF6B35" opacity="0.5">
          <animate attributeName="ry" values="8;12;8" dur="0.6s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.5;0.3;0.5" dur="0.6s" repeatCount="indefinite"/>
        </ellipse>
        <ellipse cx="60" cy="185" rx="12" ry="10" fill="#FFD166" opacity="0.7">
          <animate attributeName="ry" values="10;15;10" dur="0.5s" repeatCount="indefinite"/>
        </ellipse>
        <!-- Body -->
        <path d="M40 140 L40 70 Q40 20 60 10 Q80 20 80 70 L80 140 Z" fill="white"/>
        <!-- Nose cone accent -->
        <path d="M50 55 Q55 25 60 15 Q65 25 70 55 Z" fill="rgba(255,255,255,0.5)"/>
        <!-- Window -->
        <circle cx="60" cy="75" r="12" fill="#1a1145" stroke="#e0e0e0" stroke-width="2"/>
        <circle cx="56" cy="72" r="3" fill="rgba(255,255,255,0.3)"/>
        <!-- Fins -->
        <path d="M40 120 L20 155 L40 145 Z" fill="#FF2D6B"/>
        <path d="M80 120 L100 155 L80 145 Z" fill="#FF2D6B"/>
        <!-- Bottom detail -->
        <rect x="40" y="135" width="40" height="10" rx="2" fill="#FFD166"/>
        <!-- Body stripe -->
        <rect x="40" y="95" width="40" height="4" rx="2" fill="#e8e8e8"/>
      </svg>
    </div>

    <p class="overline">Very Soon</p>
    <h1 class="headline">Launching</h1>
    <p class="subheadline">We're building something extraordinary.<br>Be the first to experience it.</p>

    <!-- Countdown -->
    <div class="countdown" role="timer" aria-label="Countdown to launch">
      <div class="countdown-block">
        <span class="countdown-number" id="days">00</span>
        <span class="countdown-label">Days</span>
      </div>
      <div class="countdown-sep" aria-hidden="true">:</div>
      <div class="countdown-block">
        <span class="countdown-number" id="hours">00</span>
        <span class="countdown-label">Hours</span>
      </div>
      <div class="countdown-sep" aria-hidden="true">:</div>
      <div class="countdown-block">
        <span class="countdown-number" id="minutes">00</span>
        <span class="countdown-label">Minutes</span>
      </div>
      <div class="countdown-sep" aria-hidden="true">:</div>
      <div class="countdown-block">
        <span class="countdown-number" id="seconds">00</span>
        <span class="countdown-label">Seconds</span>
      </div>
    </div>

    <!-- Email form -->
    <form class="email-form" id="emailForm" novalidate>
      <div class="input-group">
        <input
          type="email"
          id="emailInput"
          placeholder="Enter your email"
          aria-label="Email address"
          required
          autocomplete="email"
        >
        <button type="submit" id="submitBtn">
          <span class="btn-text">Notify Me</span>
          <span class="btn-success" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </span>
        </button>
      </div>
      <p class="form-hint" id="formMessage">No spam. Just one email when we launch.</p>
    </form>
  </main>

  <footer>
    <a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer">
      Created with Perplexity Computer
    </a>
  </footer>

  <script src="./app.js"></script>
</body>
</html>
